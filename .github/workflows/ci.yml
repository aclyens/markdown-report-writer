name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    # pandoc/extra ships with pandoc, TeX Live, and eisvogel pre-installed
    container: docker.io/pandoc/extra:3.6.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        run: apk add --no-cache nodejs npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t markdown-report-writer .
